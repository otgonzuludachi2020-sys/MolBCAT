# Pretraining configuration — Masked SMILES Language Model on ZINC250k

data:
  dataset: edmanft/zinc250k
  num_samples: 250000

model:
  emb_dim: 256
  hidden_dim: 512

training:
  epochs: 10
  batch_size: 128
  max_len: 120
  mask_prob: 0.15
  learning_rate: 3.0e-4
  seed: 42

output:
  save_dir: ./outputs/pretrained
  vocab_file: vocab.json
  encoder_file: pretrained_encoder_epoch{epoch}.pt
  checkpoint_file: checkpoint_latest.pt
